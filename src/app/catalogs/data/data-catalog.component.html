<div class="cards-grid form-catalog-stack">
  <div class="catalog-preview paginator-showcase">
    <section id="pg-paginator" class="preview-section preview-section--flush catalog-block-section" tabindex="-1">
      <header class="catalog-block-head">
        <h3 class="section-title component-title-primary">{{ 'Paginator' | catalogBlockHeadTitle }}</h3>
      </header>

      <div class="catalog-block-body">
        <mds-catalog-preview-frame
          class="btn-section catalog-preview-section"
          [showConfig]="false"
          [showExpand]="true"
          expandAriaLabel="Expandir estados de Paginator"
          collapseAriaLabel="Contraer estados de Paginator"
        >
          <div catalogPreviewDemo class="paginator-catalog-live-shell catalog-showcase-interactive">
            <p-paginator
              class="paginator-catalog-live"
              [first]="first()"
              [rows]="rows()"
              [totalRecords]="totalRecords"
              [rowsPerPageOptions]="rowsPerPageOptions"
              [showCurrentPageReport]="true"
              [currentPageReportTemplate]="pageReportTemplate"
              [showFirstLastIcon]="true"
              appendTo="body"
              (onPageChange)="onPageChange($event)"
              ariaLabel="Paginator interactivo del catálogo"
            />
          </div>

          <ng-container catalogPreviewDetails>
            <mds-catalog-info-block title="States" icon="list">
              <div
                class="paginator-catalog-states-row is-static-preview"
                aria-label="Botones del paginator por estado"
              >
                @for (state of stateDemos; track trackState($index, state)) {
                  <div
                    class="paginator-catalog-state"
                    [class.paginator-catalog-state--informe]="state.key === 'report'"
                  >
                    <div class="paginator-catalog-state-preview">
                    <div class="p-paginator p-component paginator-catalog-state-demo" role="presentation">
                      <div class="p-paginator-content">
                        @switch (state.key) {
                          @case ('inactive') {
                            <span class="p-paginator-pages" role="presentation">
                              <button
                                type="button"
                                class="p-paginator-page p-paginator-nav-button"
                                tabindex="-1"
                              >
                                2
                              </button>
                            </span>
                          }
                          @case ('active') {
                            <span class="p-paginator-pages" role="presentation">
                              <button
                                type="button"
                                class="p-paginator-page p-paginator-nav-button p-paginator-page-selected"
                                tabindex="-1"
                                aria-current="page"
                              >
                                3
                              </button>
                            </span>
                          }
                          @case ('hover') {
                            <span class="p-paginator-pages" role="presentation">
                              <button
                                type="button"
                                class="p-paginator-page p-paginator-nav-button paginator-catalog-nav-hover-demo"
                                tabindex="-1"
                              >
                                4
                              </button>
                            </span>
                          }
                          @case ('disabled') {
                            <button
                              type="button"
                              class="p-paginator-prev p-paginator-nav-button p-disabled"
                              tabindex="-1"
                              disabled
                              aria-label="Página anterior"
                            >
                              <i class="p-paginator-prev-icon pi pi-angle-left" aria-hidden="true"></i>
                            </button>
                          }
                          @case ('report') {
                            <span class="p-paginator-current">11 - 20 de 120</span>
                          }
                        }
                      </div>
                    </div>
                    </div>
                    <mds-catalog-state-tag [label]="state.caption" />
                  </div>
                }
              </div>
            </mds-catalog-info-block>
          </ng-container>
        </mds-catalog-preview-frame>
      </div>
    </section>
  </div>
</div>
