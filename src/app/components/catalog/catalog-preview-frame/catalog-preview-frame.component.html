<div class="catalog-preview-frame catalog-surface-block">
  <div class="catalog-preview-frame__stage">
    <ng-content select="[catalogPreviewDemo]" />
  </div>

  <footer class="catalog-preview-frame__footer">
    <span class="catalog-preview-frame__badge">{{ label() }}</span>

    <div class="catalog-preview-frame__toolbar" role="toolbar" [attr.aria-label]="label() + ' actions'">
      @if (showCode()) {
        <span
          class="catalog-preview-frame__action-wrap"
          [pTooltip]="codeTooltip"
          tooltipPosition="top"
          appendTo="body"
        >
          <button
            type="button"
            class="catalog-preview-frame__action catalog-preview-frame__action--code"
            disabled
            tabindex="-1"
            [attr.aria-label]="codeAriaLabel()"
          >
            <i class="pi pi-code" aria-hidden="true"></i>
          </button>
        </span>
      }

      @if (showConfig()) {
        <button
          type="button"
          class="catalog-preview-frame__action catalog-preview-frame__action--config"
          (click)="toggleConfig($event)"
          aria-haspopup="dialog"
          [attr.aria-expanded]="configPopoverVisible()"
          [attr.aria-label]="configAriaLabel()"
          [pTooltip]="configTooltip"
          tooltipPosition="top"
          appendTo="body"
        >
          <i class="pi pi-cog" aria-hidden="true"></i>
        </button>
      }

      @if (showExpand()) {
        <button
          type="button"
          class="catalog-preview-frame__action catalog-preview-frame__action--expand"
          (click)="toggleExpand()"
          [attr.aria-expanded]="expanded()"
          [attr.aria-label]="expanded() ? collapseAriaLabel() : expandAriaLabel()"
          [pTooltip]="expanded() ? collapseTooltip : expandTooltip"
          tooltipPosition="top"
          appendTo="body"
        >
          @if (expanded()) {
            <i class="pi pi-window-minimize" aria-hidden="true"></i>
          } @else {
            <i class="pi pi-expand" aria-hidden="true"></i>
          }
        </button>
      }
    </div>
  </footer>

  @if (showConfig()) {
    <p-popover
      #configPopover
      styleClass="button-config-popover"
      appendTo="body"
      [ariaLabel]="configAriaLabel()"
    >
      <div class="button-config-popover-body input-icon-switches button-config-switches">
        <ng-content select="[catalogPreviewConfig]" />
      </div>
    </p-popover>
  }
</div>

@if (showExpand() && expanded()) {
  <div class="catalog-preview-details">
    <ng-content select="[catalogPreviewDetails]" />
  </div>
}
