# Publica legacy (raíz) + Fase 0 Angular en /phase0/
# Requiere: Settings → Pages → Source: GitHub Actions

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: apps/playground/pnpm-lock.yaml

      - name: Install (Angular app)
        run: pnpm install --frozen-lockfile
        working-directory: apps/playground

      - name: Build Angular (github-pages)
        run: pnpm run build:pages
        working-directory: apps/playground

      - name: Assemble site (legacy + phase0)
        run: |
          mkdir -p _site/phase0
          rsync -a \
            --exclude apps \
            --exclude node_modules \
            --exclude _site \
            --exclude .git \
            ./ _site/
          cp -r apps/playground/dist/playground/browser/* _site/phase0/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
